<!DOCTYPE html><html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday Munadia Annur</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }body {
  background: linear-gradient(135deg, #ffe066, #ffd43b, #fff3bf);
  overflow: hidden;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  color: #5c3d00;
}

.container {
  width: 90%;
  max-width: 700px;
  background: rgba(255,255,255,0.25);
  backdrop-filter: blur(10px);
  border-radius: 30px;
  padding: 40px 25px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.15);
  position: relative;
  z-index: 2;
}

h1 {
  font-size: 2.8rem;
  margin-bottom: 10px;
  animation: fadeIn 2s ease;
}

h2 {
  font-size: 1.4rem;
  margin-bottom: 20px;
  color: #7a5200;
}

p {
  font-size: 1rem;
  line-height: 1.8;
  margin-top: 15px;
}

.btn {
  margin-top: 30px;
  padding: 14px 30px;
  border: none;
  border-radius: 50px;
  background: #ffcc00;
  color: #5c3d00;
  font-size: 1rem;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

.btn:hover {
  transform: scale(1.05);
  background: #ffd000;
}

.message {
  display: none;
  animation: fadeIn 2s ease;
  margin-top: 25px;
  background: rgba(255,255,255,0.55);
  border-radius: 20px;
  padding: 20px;
  max-height: 220px;
  overflow: hidden;
  position: relative;
}

.scroll-text {
  display: inline-block;
  animation: scrollUp 15s linear infinite;
}

.sunflower {
  position: absolute;
  font-size: 50px;
  animation: float 6s linear infinite;
  opacity: 0.8;
}

@keyframes float {
  0% {
    transform: translateY(100vh) rotate(0deg);
  }
  100% {
    transform: translateY(-120vh) rotate(360deg);
  }
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes scrollUp {
  0% {
    transform: translateY(100%);
  }
  100% {
    transform: translateY(-100%);
  }
}
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.heart {
  color: #ff4d6d;
  font-size: 1.3rem;
}

.slideshow {
  display: none;
  margin-top: 25px;
}

.foto-slide {
  width: 180px;
  aspect-ratio: 1 / 1;
  object-fit: cover;
  border-radius: 20px;
  border: 5px solid white;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  animation: fadeIn 1s ease;
}

  </style>
</head>
<body>  <div class="container">
    <h1>🌻 Happy Birthday 🌻</h1>
    <h2>MUNADIA ANNUR HUSNA</h2><button onclick="playMusic()" class="btn">
  Putar Lagu 🎵
</button>

<button class="btn" onclick="showSurprise()">Klik Surprise 🎁</button>

<div class="slideshow" id="slideshow">
  <img id="slide" src="foto1.jpg" class="foto-slide">
</div>

  </div>
  </div>  <audio id="music" loop>
    <source src="musik.mp3" type="audio/mp3">
  </audio>  <script>
    function playMusic() {
      document.getElementById('music').play();
    }
    
    ];

    let currentPhoto = 0;

    function showSurprise() {
      document.getElementById('slideshow').style.display = 'block';

      setInterval(() => {
        currentPhoto = (currentPhoto + 1) % photos.length;
        document.getElementById('slide').src = photos[currentPhoto];
      }, 2500);
    }

    function createSunflower() {
      const flower = document.createElement('div');
      flower.classList.add('sunflower');
      flower.innerHTML = '🌻';
      flower.style.left = Math.random() * 100 + 'vw';
      flower.style.animationDuration = (Math.random() * 3 + 4) + 's';
      flower.style.fontSize = (Math.random() * 30 + 30) + 'px';

      document.body.appendChild(flower);

      setTimeout(() => {
        flower.remove();
      }, 7000);
    }

    setInterval(createSunflower, 500);
  </script>  <iframe width="0" height="0" 
    src="https://www.youtube.com/embed/ziXnK8bo6t8?autoplay=1&loop=1&playlist=ziXnK8bo6t8" 
    title="Selamat Ulang Tahun Jamrud"
    frameborder="0"
    allow="autoplay"
    allowfullscreen>
  </iframe>
</body>
</html>
